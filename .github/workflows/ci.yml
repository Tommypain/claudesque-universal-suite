name: Liberty Studio CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test Workspace
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install Dependencies
      run: pnpm install

    - name: Compile Web Workspaces
      run: pnpm run build

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Compile Rust FFI Bridges
      run: |
        cd bridge/rust
        cargo check
